<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — StratAI Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-primary: #0f0f12;
        --text-primary: #e8eaed;
        --text-secondary: #999ba3;
        --accent: #6aa8ff;
        --accent-alt: #00d4ff;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        text-align: center;
        max-width: 600px;
      }
      .code {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 3rem;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 1rem;
        letter-spacing: 0.08em;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin: 0 0 0.75rem;
        letter-spacing: -0.02em;
      }
      p {
        color: var(--text-secondary);
        font-size: 1rem;
        line-height: 1.6;
        margin: 0 0 2rem;
      }
      .button {
        display: inline-block;
        padding: 0.75rem 1.75rem;
        background: var(--accent);
        color: var(--bg-primary);
        border: none;
        border-radius: 4px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
      }
      .button:hover {
        background: var(--accent-alt);
        box-shadow: 0 0 20px rgba(0,212,255,0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Sector Not Found</h1>
      <p>The operational zone you requested does not exist in the StratAI command network. Verify your coordinates and try again.</p>
      <a href="index.html" class="button">Return to Command Center</a>
    </div>
  </body>
</html>
